[package]
name = "system-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
console_error_panic_hook = "0.1.7"
hex = { version = "0.4.3", features = [], default-features = false }
itertools = "0.14.0"
secp256k1 = { version = "0.30.0", features = ["global-context"] }
serde = { version = "1.0.228", features = ["derive"], default-features = false }
serde-wasm-bindgen = "0.6.5"
serde_json = { version = "1.0.105", default-features = false, features = ["alloc"] }
sha256 = { version = "1.6.0", features = [], default-features = false }
wasm-bindgen = "0.2.114"
web-sys = { version = "0.3", features = ["console"] }

[dev-dependencies]
rand = "0.8.5"
wasm-bindgen-test = "0.3.37"
serde_json = "1.0.105"
criterion = { version = "0.5" }

[[bench]]
name = "basic"
harness = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[package.metadata.wasm-pack.profile.release]
wasm-opt = ["-O3", "--enable-simd"]
